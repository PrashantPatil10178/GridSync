# Nixpacks configuration for GridSync - Coolify
# Single service deployment (API + Web)

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]
aptPkgs = ["openssl"]

[phases.install]
cmds = ["npm install -g pnpm@9", "pnpm install"]

[phases.build]
cmds = [
  "cd apps/api && npx prisma generate",
  "cd apps/api && npx tsc",
  "cd apps/web && npx next build",
  "cd apps/api && npx prisma db push --skip-generate",
  "cd apps/api && node prisma/seed.cjs"
]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"
