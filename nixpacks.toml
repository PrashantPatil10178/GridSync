# Nixpacks configuration for GridSync - Coolify
# Single service deployment (API + Web)

[phases.setup]
# Include pnpm in the Nix environment so it is available in build containers
nixPkgs = ["nodejs_20", "pnpm", "openssl"]
aptPkgs = ["openssl"]

[phases.install]
# pnpm is installed by the Nix environment; use it directly
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "cd packages/types && npx tsc",
  "cd apps/api && npx prisma generate",
  "cd apps/api && npx tsc",
  "cd apps/web && npx next build",
  "cd apps/api && npx prisma db push --skip-generate",
  "cd apps/api && node prisma/seed.cjs"
]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"
